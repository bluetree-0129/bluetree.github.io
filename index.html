<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>Blue Tree's Nook</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body { 
            max-width: 900px; 
            margin: 20px auto; 
            padding: 0 20px; 
            font-family: Arial; 
            background-color: #1A237E; 
            color: white;
            position: relative;
            min-height: 100vh;
        }

        .night-sky {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -2;
            pointer-events: none;
        }

        .star {
            position: absolute;
            background: rgba(255,255,255,0.6);
            border-radius: 50%;
            animation: twinkle 3s infinite alternate;
        }

        @keyframes twinkle {
            0% { opacity: 0.2; }
            100% { opacity: 0.8; }
        }

        .note-box {
            margin: 30px 0;
            padding: 12px 15px;
            background: rgba(255,255,255,0.08);
            border-radius: 10px;
            border-left: 3px solid rgba(255,255,255,0.4);
        }
        .note-date {
            font-size: 12px;
            opacity: 0.6;
            margin-bottom: 4px;
        }
        .note-text {
            font-size: 15px;
            line-height: 1.5;
        }

        .photo-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin: 20px 0;
        }
        .photo-item {
            width: calc(33.333% - 7px);
        }
        .photo-item img {
            width: 100%;
            height: auto;
            border-radius: 4px;
            border: 2px solid white;
            cursor: pointer;
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.8);
            z-index: 100;
            justify-content: center;
            align-items: center;
        }
        .modal-content {
            max-width: 90%;
            max-height: 90%;
        }
        .close-btn {
            position: absolute;
            top: 20px;
            right: 30px;
            color: white;
            font-size: 40px;
            cursor: pointer;
        }
    </style>
</head>

<body>

<div class="night-sky"></div>

<h1>🌲 Blue Tree's Nook </h1>

<div class="note-box">
    <div class="note-date">2026-02-24</div>
    <div class="note-text">上班摸鱼研究了好久 终于成功了</div>
    <div class="note-text">一些回家的故事 希望新的一年我们顺顺利利 心想事成</div>
</div>

<h3>马年春节 🐴🧧🎆</h3>

<div class="photo-grid">
    <div class="photo-item"><img src="PICT0040.jpg" onclick="openModal(this.src)"></div>
    <div class="photo-item"><img src="HZ260218-3.jpg" onclick="openModal(this.src)"></div>
    <div class="photo-item"><img src="HZ260218-4.jpg" onclick="openModal(this.src)"></div>
    <div class="photo-item"><img src="HZ260218-5.jpg" onclick="openModal(this.src)"></div>
</div>

<!-- 碎碎念 -->
<div class="note-box">
    <div class="note-date">2026-03-05</div>
    <div class="note-text">是风就浩荡 是钢就铿锵 不用谁看见你眼底的星</div>
</div>

<!-- 标题放到这里 -->
<h3>惊蛰无声 </h3>

<div class="photo-grid">
    <div class="photo-item"><img src="还有明天.jpg" onclick="openModal(this.src)"></div>
    <div class="photo-item"><img src="JZ1.jpg" onclick="openModal(this.src)"></div>
    <div class="photo-item"><img src="JZ10.jpg" onclick="openModal(this.src)"></div>
    <div class="photo-item"><img src="JZ6.jpg" onclick="openModal(this.src)"></div>
    <div class="photo-item"><img src="JZ8.jpg" onclick="openModal(this.src)"></div>
    <div class="photo-item"><img src="JZ3.jpg" onclick="openModal(this.src)"></div>
    <div class="photo-item"><img src="JZ2.jpg" onclick="openModal(this.src)"></div>
    <div class="photo-item"><img src="JZ11.jpg" onclick="openModal(this.src)"></div>
</div>

<div class="modal" id="imgModal" onclick="closeModal()">
    <span class="close-btn" onclick="closeModal()">×</span>
    <img class="modal-content" id="modalImg">
</div>

<!-- 碎碎念 -->
<div class="note-box">
    <div class="note-date">2026-03-30</div>
    <div class="note-text">凌晨五点 从浙东到江西 希望能常有出走的决心和行动力</div>
</div>

<!-- 标题放到这里 -->
<h3>上春山⛰️</h3>

<div class="photo-grid">
    <div class="photo-item"><img src="wuyuan1.jpg" onclick="openModal(this.src)"></div>
    <div class="photo-item"><img src="wuyuan2.jpg" onclick="openModal(this.src)"></div>
    <div class="photo-item"><img src="wuyuan3.jpg" onclick="openModal(this.src)"></div>
    <div class="photo-item"><img src="wuyuan4.jpg" onclick="openModal(this.src)"></div>
    <div class="photo-item"><img src="wuyuan5.jpg" onclick="openModal(this.src)"></div>
    <div class="photo-item"><img src="wuyuan6.jpg" onclick="openModal(this.src)"></div>
    <div class="photo-item"><img src="wuyuan7.jpg" onclick="openModal(this.src)"></div>
    <div class="photo-item"><img src="wuyuan8.jpg" onclick="openModal(this.src)"></div>
    <div class="photo-item"><img src="wuyuan9.jpg" onclick="openModal(this.src)"></div>
</div>

<div class="modal" id="imgModal" onclick="closeModal()">
    <span class="close-btn" onclick="closeModal()">×</span>
    <img class="modal-content" id="modalImg">
</div>
<script>
    function openModal(src) {
        document.getElementById("imgModal").style.display = "flex";
        document.getElementById("modalImg").src = src;
    }
    function closeModal() {
        document.getElementById("imgModal").style.display = "none";
    }
    document.addEventListener("keydown", function(e) {
        if (e.key === "Escape") closeModal();
    });

    const sky = document.querySelector(".night-sky");
    for(let i=0; i<40; i++){
        let star = document.createElement("div");
        star.classList.add("star");
        let size = Math.random()*2 + 1;
        star.style.width = size + "px";
        star.style.height = size + "px";
        star.style.left = Math.random()*100 + "%";
        star.style.top = Math.random()*100 + "%";
        star.style.animationDelay = Math.random()*3 + "s";
        sky.appendChild(star);
    }
</script>

</body>
</html>
